<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рекрутинг - Вакансии</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-3">
        <!-- Главная страница - список вакансий -->
        <div id="vacancies-page">
            <h2 class="mb-4 text-center">💼 Доступные вакансии</h2>
            <div id="vacancies-list" class="vacancies-list"></div>
        </div>

        <!-- Страница отклика -->
        <div id="apply-page" style="display: none;">
            <h2 class="mb-4 text-center">📝 Отклик на вакансию</h2>
            <form id="apply-form">
                <input type="hidden" id="vacancy-id" name="vacancy_id">
                
                <div class="mb-3">
                    <label class="form-label">👤 Ваше имя</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">📞 Телефон</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">💼 Опыт работы</label>
                    <textarea class="form-control" id="experience" rows="3" placeholder="Расскажите о своём опыте..."></textarea>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">📄 Ссылка на резюме (необязательно)</label>
                    <input type="url" class="form-control" id="resume_link" placeholder="https://...">
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">✅ Отправить отклик</button>
                    <button type="button" class="btn btn-secondary" onclick="showVacancies()">← Назад к вакансиям</button>
                </div>
            </form>
        </div>

        <!-- Страница подтверждения -->
        <div id="success-page" style="display: none;">
            <div class="text-center py-5">
                <div class="display-1">✅</div>
                <h3 class="mt-3">Отклик отправлен!</h3>
                <p class="text-muted">Мы свяжемся с вами в ближайшее время</p>
                <button class="btn btn-primary mt-3" onclick="showVacancies()">← К вакансиям</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
