<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Recruitment System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar-link:hover, .sidebar-link.active {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
        }
        .stat-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-lg min-h-screen fixed">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-gray-800">
                    <i class="fas fa-robot text-blue-500"></i>
                    <span class="ml-2">RecruitAI</span>
                </h1>
                <p class="text-xs text-gray-500 mt-1">Система рекрутинга</p>
            </div>
            
            <nav class="mt-6">
                <a href="/" class="sidebar-link {% if request.url.path == '/' %}active{% endif %} flex items-center px-6 py-3 text-gray-700">
                    <i class="fas fa-chart-pie w-6"></i>
                    <span class="ml-2">Дашборд</span>
                </a>

                <a href="/candidates" class="sidebar-link {% if 'candidates' in request.url.path %}active{% endif %} flex items-center px-6 py-3 text-gray-700">
                    <i class="fas fa-users w-6"></i>
                    <span class="ml-2">Кандидаты</span>
                </a>

                <a href="/vacancies" class="sidebar-link {% if 'vacancies' in request.url.path %}active{% endif %} flex items-center px-6 py-3 text-gray-700">
                    <i class="fas fa-briefcase w-6"></i>
                    <span class="ml-2">Вакансии</span>
                </a>

                <a href="/analytics" class="sidebar-link {% if 'analytics' in request.url.path %}active{% endif %} flex items-center px-6 py-3 text-gray-700">
                    <i class="fas fa-chart-line w-6"></i>
                    <span class="ml-2">Аналитика</span>
                </a>

                <a href="/contacts" class="sidebar-link {% if 'contacts' in request.url.path %}active{% endif %} flex items-center px-6 py-3 text-gray-700">
                    <i class="fas fa-address-book w-6"></i>
                    <span class="ml-2">Контакты</span>
                </a>

                <a href="/settings" class="sidebar-link {% if 'settings' in request.url.path %}active{% endif %} flex items-center px-6 py-3 text-gray-700">
                    <i class="fas fa-cog w-6"></i>
                    <span class="ml-2">Настройки</span>
                </a>
            </nav>
            
            <div class="absolute bottom-0 w-64 p-6 bg-gray-50">
                <div class="flex items-center">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="ml-2 text-sm text-gray-600">Система активна</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="ml-64 flex-1 p-8">
            {% block content %}{% endblock %}
        </main>
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
